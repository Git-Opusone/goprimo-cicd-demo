name: CI - Build, Push, Deploy

on:
  push:
    branches:
      - main
      - ci-demo-scenarios
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/git-opusone/goprimo-cicd-demo

jobs:
  ci-build-push:
    name: Code Quality, Test, Security, Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint check
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run dependency vulnerability audit
        run: npm audit --audit-level=high

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Scan Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
        continue-on-error: true

      - name: Build Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          echo "Building Docker image:"
          echo "Latest tag: $IMAGE_NAME:latest"
          echo "Version tag: $IMAGE_NAME:$SHORT_SHA"

          docker build \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:$SHORT_SHA \
            .

      - name: Run container smoke test
        run: |
          docker rm -f smoke-test 2>/dev/null || true

          docker run -d \
            --name smoke-test \
            -p 3000:3000 \
            $IMAGE_NAME:latest

          sleep 5

          curl -f http://localhost:3000/health

          docker stop smoke-test
          docker rm smoke-test

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          echo "Pushing Docker image:"
          echo "$IMAGE_NAME:latest"
          echo "$IMAGE_NAME:$SHORT_SHA"

          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$SHORT_SHA

  deploy-uat:
    name: Deploy to UAT VM
    runs-on: ubuntu-latest
    needs: ci-build-push

    steps:
      - name: Deploy latest image to UAT over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            IMAGE="ghcr.io/git-opusone/goprimo-cicd-demo:latest"
            CONTAINER="goprimo-cicd-demo-uat"

            echo "Deploying UAT image: $IMAGE"

            docker network create cicd-net 2>/dev/null || true

            docker pull "$IMAGE"

            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --network cicd-net \
              -e APP_ENV=uat \
              "$IMAGE"

            sleep 8

            echo "Running UAT health check..."
            curl --max-time 15 --retry 5 --retry-delay 3 -f -H "Host: uat-cicd.goprimo.ai" http://127.0.0.1/health

            docker image prune -f

  deploy-prod:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    needs: deploy-uat
    environment:
      name: production
      url: https://cicd.goprimo.ai

    steps:
      - name: Deploy approved image to Production over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            SHORT_SHA="${{ github.sha }}"
            SHORT_SHA="${SHORT_SHA:0:7}"

            IMAGE="ghcr.io/git-opusone/goprimo-cicd-demo:$SHORT_SHA"
            CONTAINER="goprimo-cicd-demo-prod"

            echo "Deploying Production image: $IMAGE"

            docker network create cicd-net 2>/dev/null || true

            docker pull "$IMAGE"

            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --network cicd-net \
              -e APP_ENV=prod \
              "$IMAGE"

            sleep 8

            echo "Running Production health check..."
            curl --max-time 15 --retry 5 --retry-delay 3 -f -H "Host: cicd.goprimo.ai" http://127.0.0.1/health

            docker image prune -f



